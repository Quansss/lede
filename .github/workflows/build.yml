name: Build CR6606 with sharkos

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential libncurses-dev bison flex libssl-dev libelf-dev python3 -y

      - name: Clone LEDE source
        run: |
          git clone https://github.com/coolsnowwolf/lede lede --depth 1

      - name: Add SSR+ / PassWall2 / FRPC
        run: |
          cd lede
          git clone https://github.com/fw876/helloworld package/helloworld
          git clone https://github.com/xiaorouji/openwrt-passwall2 package/passwall2

      - name: Update feeds
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate CR6606 config
        run: |
          cd lede
          cat > .config << EOF
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-cr6606=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-app-frpc=y
          # 精简多余软件
          CONFIG_PACKAGE_luci-app-qbittorrent is not set
          CONFIG_PACKAGE_luci-app-transmission is not set
          CONFIG_PACKAGE_luci-app-zerotier is not set
          CONFIG_PACKAGE_luci-app-sqm is not set
          EOF
          make defconfig

      - name: Download packages
        run: cd lede && make download -j8

      - name: Compile firmware
        run: cd lede && make -j4

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cr6606-with-plugins
          path: lede/bin/targets/ramips/mt7621/*
